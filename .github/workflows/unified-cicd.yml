name: Unified CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - oaktree
  pull_request:
    branches:
      - main
      - develop
      - oaktree
  workflow_dispatch:

# Prevent redundant concurrent builds for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # 1. Path Filtering: Detect which projects changed
  # ---------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      mcp: ${{ steps.filter.outputs.mcp }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            mcp:
              - 'mcp-worker/**'
            workflow:
              - '.github/workflows/**'

  # ---------------------------------------------------------
  # 2. Frontend Build & Deploy
  # ---------------------------------------------------------
  frontend:
    name: Frontend
    needs: changes
    # Run if frontend changed, or if workflows changed, or if manually dispatched
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check (Astro)
        working-directory: frontend
        run: npx astro check || echo "Astro check skipped/failed"

      - name: Build Application
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages (Preview)
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=oaktree-agent-frontend --branch=${{ github.head_ref }}

      - name: Deploy to Cloudflare Pages (Production)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=oaktree-agent-frontend --commit-dirty=true

  # ---------------------------------------------------------
  # 3. Backend Build & Deploy
  # ---------------------------------------------------------
  backend:
    name: Backend
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit || echo "No TS config found"

      - name: Deploy to Cloudflare Workers (Preview)
        if: github.event_name == 'pull_request'
        working-directory: backend
        run: echo "Preview deployments for Workers can be configured via environment flags or separate wrangler.toml environments."

      - name: Deploy to Cloudflare Workers (Production)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy

  # ---------------------------------------------------------
  # 4. MCP Worker Build & Deploy
  # ---------------------------------------------------------
  mcp-worker:
    name: MCP Worker
    needs: changes
    if: ${{ needs.changes.outputs.mcp == 'true' || needs.changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp-worker/package-lock.json

      - name: Install dependencies
        working-directory: mcp-worker
        run: npm ci

      - name: Type check
        working-directory: mcp-worker
        run: npx tsc --noEmit || echo "No TS config found"

      - name: Deploy to Cloudflare Workers (Production)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: mcp-worker
          command: deploy

  # ---------------------------------------------------------
  # 5. Global Status Summary
  # ---------------------------------------------------------
  summary:
    name: Deployment Summary
    needs: [frontend, backend, mcp-worker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "### 🚀 CI/CD Pipeline Execution" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Completed pipeline checks." >> $GITHUB_STEP_SUMMARY
