name = "oaktree-mcp"
main = "src/index.ts"
compatibility_date = "2024-11-18"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "oaktree-db"
database_id = "97634677-4bac-44d1-bd02-6c733328a137"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "oaktree-assets"

[durable_objects]
bindings = [
  { name = "OAKTREE_MCP", class_name = "OaktreeMCP" },
  { name = "OAKTREE_CHAT", class_name = "OaktreeChat" }
]

[observability.logs]
enabled = true
invocation_logs = true


[[migrations]]
tag = "v1"
new_sqlite_classes = ["OaktreeMCP"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["OaktreeChat"]

# NotebookLM bridge â€” set this to your Cloudflare Tunnel URL
# Override with: npx wrangler secret put NOTEBOOKLM_BRIDGE_URL
[vars]
NOTEBOOKLM_BRIDGE_URL = ""  # e.g. "https://xxxx.trycloudflare.com"
ENABLE_DATABASE_AGENT = "false"
chat_ai_model = "@cf/google/gemma-4-26b-a4b-it"
db_ai_model = "@cf/meta/llama-3-8b-instruct"

[dev]
port = 8788




