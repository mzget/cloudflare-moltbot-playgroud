name = "oaktree-backend"
main = "src/index.ts"
compatibility_date = "2024-11-18"
compatibility_flags = [ "nodejs_compat" ]

[observability.logs]
enabled = true
invocation_logs = true


[[r2_buckets]]
binding = "KNOWLEDGE_BUCKET"
bucket_name = "oaktree-knowledge"

[browser]
binding = "BROWSER"

[ai]
binding = "AI"
remote = true

[[d1_databases]]
binding = "DB"
database_name = "moltbot-db"
database_id = "97634677-4bac-44d1-bd02-6c733328a137"

[[send_email]]
name = "EMAIL"
destination_address = "rattajak.n@gmail.com"

[triggers]
crons = ["0 * * * *", "*/30 * * * *"] # Hourly full sync + every 30 min for Facebook

[[workflows]]
name = "oaktree-sync-workflow"
binding = "OAKTREE_SYNC_WORKFLOW"
class_name = "OaktreeSyncWorkflow"

